services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: confluence-mermaid-publisher-mcp-dev
    working_dir: /app
    command: bash
    environment:
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-}
      CONFLUENCE_EMAIL: ${CONFLUENCE_EMAIL:-}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN:-}
      CONFLUENCE_BEARER_TOKEN: ${CONFLUENCE_BEARER_TOKEN:-}
      COPILOT_MCP_CONFLUENCE_URL: ${COPILOT_MCP_CONFLUENCE_URL:-}
      COPILOT_MCP_CONFLUENCE_USERNAME: ${COPILOT_MCP_CONFLUENCE_USERNAME:-}
      COPILOT_MCP_CONFLUENCE_API_TOKEN: ${COPILOT_MCP_CONFLUENCE_API_TOKEN:-}
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      - confluence_mermaid_publisher_mcp_m2:/root/.m2
      - confluence_mermaid_publisher_mcp_npm:/root/.npm

  mcp:
    image: confluence-mermaid-publisher-mcp-dev
    working_dir: /app
    command:
      - mcp
    environment:
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-}
      CONFLUENCE_EMAIL: ${CONFLUENCE_EMAIL:-}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN:-}
      CONFLUENCE_BEARER_TOKEN: ${CONFLUENCE_BEARER_TOKEN:-}
      COPILOT_MCP_CONFLUENCE_URL: ${COPILOT_MCP_CONFLUENCE_URL:-}
      COPILOT_MCP_CONFLUENCE_USERNAME: ${COPILOT_MCP_CONFLUENCE_USERNAME:-}
      COPILOT_MCP_CONFLUENCE_API_TOKEN: ${COPILOT_MCP_CONFLUENCE_API_TOKEN:-}
    stdin_open: true
    tty: false
    volumes:
      - .:/app
      - confluence_mermaid_publisher_mcp_m2:/root/.m2
      - confluence_mermaid_publisher_mcp_npm:/root/.npm

volumes:
  confluence_mermaid_publisher_mcp_m2:
  confluence_mermaid_publisher_mcp_npm:
